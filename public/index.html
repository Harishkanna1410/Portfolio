<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Portfolio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="brand">Harish Kanna S</h1>
      <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="social">
        <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://twitter.com/" target="_blank" rel="noopener">Twitter</a>
      </div>
    </header>

    <main>
      <section id="hero">
        <div id="canvas-container"></div>
        <div class="hero-overlay">
          <h2>Hi — I'm Harish Kanna </h2>
          <p>Interactive 3D portfolio built with Three.js and Node.js</p>
        </div>
      </section>

      <section id="about">
        <h2>About</h2>
        <p>I build interactive web experiences and 3D visualizations.</p>
      </section>

      <section id="skills">
        <h2>Skills</h2>
        <ul id="skills-list"></ul>
      </section>

      <section id="projects">
        <h2>Projects</h2>
        <div id="projects-list"></div>
      </section>

      <section id="contact">
        <h2>Contact</h2>
        <form id="contact-form">
          <label>Name<br /><input type="text" name="name" required /></label>
          <label>Email<br /><input type="email" name="email" required /></label>
          <label>Message<br /><textarea name="message" rows="5" required></textarea></label>
          <button type="submit">Send Message</button>
          <p id="contact-response" aria-live="polite"></p>
        </form>
      </section>

    <footer class="site-footer">
      <p>© Harish Kanna S — <a href="#contact">Contact me</a></p>
    </footer>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
